cmd = 'command -v fzf'

[items.pipx]
name = "pipx"
desc = "Python application installer used throughout the legacy scripts."
depends_on = ["essentials"]

[[items.pipx.recipes]]
mode = "user"
distros = ["*"]
cmd = 'if command -v pipx >/dev/null 2>&1; then pipx ensurepath --force || true; elif python3 -m pip --version >/dev/null 2>&1; then python3 -m pip install --user pipx && python3 -m pipx ensurepath --force || true; else echo "pip is unavailable; skipping pipx bootstrap"; fi'

[[items.pipx.verifiers]]
mode = "user"
distros = ["*"]
cmd = 'command -v pipx'

