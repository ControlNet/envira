required_version = "0.1.0"
distros = ["ubuntu", "mint", "popos", "fedora", "centos", "arch", "manjaro", "endeavouros", "opensuse", "opensuse-tumbleweed"]
shell = "bash"
default_bundles = ["core", "terminal-tools", "observability"]

[bundles.core]
name = "Core"
desc = "Core system packages and foundation tools."
items = ["essentials"]

[bundles.terminal-tools]
name = "Terminal Tools"
desc = "Terminal-first utilities used in the legacy installers."
items = ["bat", "ctop", "fastfetch"]

[bundles.observability]
name = "Observability"
desc = "Monitoring and system inspection tools."
items = ["btop"]

[bundles.containers]
name = "Containers"
desc = "Container engines and terminal tooling."
items = ["docker", "lazydocker", "dive"]

[bundles.remote-access]
name = "Remote Access"
desc = "Remote access and clipboard helpers."
items = ["vnc", "lemonade"]

[bundles.services]
name = "Services"
desc = "Service-like tools that need usability verification."
items = ["jupyter", "pm2"]

[bundles.desktop-tools]
name = "Desktop Tools"
desc = "Desktop-oriented applications and fonts from the legacy installers."
items = ["neofetch", "ncdu", "gitkraken", "meslo-font"]

[bundles.shell-customization]
name = "Shell Customization"
desc = "Shell setup, plugins, and interactive navigation helpers."
items = ["oh-my-zsh", "zsh-theme", "zsh-plugins", "fzf"]

[bundles.languages]
name = "Languages"
desc = "Language runtimes, package managers, and base developer toolchains."
items = ["pipx", "miniconda", "rust-toolchain", "go-toolchain", "fnm", "nodejs", "uv", "pixi"]

[bundles.editors]
name = "Editors"
desc = "Editors and editor distributions installed by the legacy scripts."
items = ["neovim", "lunarvim", "micro"]

[bundles.git-tooling]
name = "Git Tooling"
desc = "Git-adjacent applications and CLI workflows."
items = ["git-lfs", "lazygit", "git-delta", "gh"]

[bundles.tui-tooling]
name = "TUI Tooling"
desc = "CLI/TUI utilities installed via cargo, go, and shell installers."
items = ["zellij", "lsd", "cargo-cache", "duf", "dust", "fd", "ripgrep", "gping", "procs", "xh", "zoxide", "scc", "viu", "superfile", "yazi", "tldr"]

[bundles.ai-agents]
name = "AI Agents"
desc = "CLI coding agents and their supporting runtimes."
items = ["codex-cli", "gemini-cli", "cursor-cli", "claude-cli", "opencode-cli", "bun", "oh-my-opencode", "openchamber-web", "oh-my-pi", "beads", "perles", "dolt"]

[bundles.monitoring]
name = "Monitoring"
desc = "Monitoring, telemetry, and host inspection tools."
items = ["bottom", "nvitop", "nviwatch", "bandwhich", "rich-cli", "speedtest-cli", "archey4", "genact"]

[bundles.cloud-data]
name = "Cloud and Data"
desc = "Download, transfer, and package-distribution helpers."
items = ["gdown", "huggingface-cli", "gotify"]

[bundles.devops]
name = "DevOps"
desc = "Build, bootstrap, and low-level operator tooling."
items = ["cargo-binstall", "rustscan"]

[items.essentials]
name = "Essentials"
desc = "Foundation packages from the legacy system installer scripts."
depends_on = []

[[items.essentials.recipes]]
mode = "sudo"
distros = ["ubuntu", "mint", "popos"]
cmd = 'sudo apt update && sudo apt install -y iputils-ping net-tools python3-venv apt-utils make openssh-server gedit vim git git-lfs curl wget zsh gcc perl build-essential libfuse2 python3-pip screen tmux ncdu bat pipx xsel screenfetch neofetch p7zip-full unzip mosh nmap'

[[items.essentials.recipes]]
mode = "sudo"
distros = ["fedora"]
cmd = 'sudo dnf install -y python3 pipx gedit vim git git-lfs curl wget zsh gcc make perl screen tmux ncdu xsel unzip bat screenfetch neofetch fastfetch mosh iperf3 nmap btop'

[[items.essentials.recipes]]
mode = "sudo"
distros = ["centos"]
cmd = 'sudo yum install -y python3 dnf gedit vim git git-lfs curl wget zsh gcc make perl build-essential screen tmux ncdu xsel unzip iperf3 nmap'

[[items.essentials.recipes]]
mode = "sudo"
distros = ["arch", "manjaro", "endeavouros"]
cmd = 'sudo pacman -Sy --noconfirm gedit vim git git-lfs curl wget zsh gcc make perl base-devel binutils screen tmux ncdu bat python-pip python-pipx xsel screenfetch fastfetch p7zip unzip mosh iperf3 nmap btop'

[[items.essentials.recipes]]
mode = "sudo"
distros = ["opensuse", "opensuse-tumbleweed"]
cmd = 'sudo zypper install -y python3 python3-pip gedit vim git git-lfs curl wget zsh gcc make perl screen tmux ncdu bat xsel screenfetch neofetch fastfetch p7zip unzip mosh iperf nmap btop'

[[items.essentials.verifiers]]
mode = "sudo"
distros = ["*"]
cmd = 'command -v git && command -v curl && command -v wget && command -v tmux'

[items.git-lfs]
name = "Git LFS"
desc = "Git Large File Storage support."
depends_on = ["essentials"]

[[items.git-lfs.recipes]]
mode = "sudo"
distros = ["ubuntu", "mint", "popos"]
cmd = 'sudo apt install -y git-lfs'

[[items.git-lfs.recipes]]
mode = "sudo"
distros = ["fedora", "centos"]
cmd = 'sudo dnf install -y git-lfs'

[[items.git-lfs.recipes]]
mode = "sudo"
distros = ["arch", "manjaro", "endeavouros"]
cmd = 'sudo pacman -Sy --noconfirm git-lfs'

[[items.git-lfs.recipes]]
mode = "sudo"
distros = ["opensuse", "opensuse-tumbleweed"]
cmd = 'sudo zypper install -y git-lfs'

[[items.git-lfs.verifiers]]
mode = "sudo"
distros = ["*"]
cmd = 'command -v git-lfs'

[items.bat]
name = "bat"
desc = "A cat clone with syntax highlighting and Git integration."
depends_on = ["essentials"]

[[items.bat.recipes]]
mode = "sudo"
distros = ["ubuntu", "mint", "popos"]
cmd = 'sudo apt install -y bat && mkdir -p ~/.local/bin && ln -sf /usr/bin/batcat ~/.local/bin/bat'

[[items.bat.recipes]]
mode = "user"
distros = ["*"]
cmd = 'mkdir -p ~/.local/bin && wget -O bat.tar.gz https://github.com/sharkdp/bat/releases/download/v0.25.0/bat-v0.25.0-x86_64-unknown-linux-musl.tar.gz && tar -xvzf bat.tar.gz -C ~/.local/bin && mv ~/.local/bin/bat-v0.25.0-x86_64-unknown-linux-musl/bat ~/.local/bin/bat && rm -r ~/.local/bin/bat-v0.25.0-x86_64-unknown-linux-musl && rm bat.tar.gz'

[[items.bat.verifiers]]
mode = "user"
distros = ["*"]
cmd = 'command -v bat || command -v batcat'

[[items.bat.verifiers]]
mode = "sudo"
distros = ["*"]
cmd = 'command -v bat || command -v batcat'

[items.ctop]
name = "ctop"
