[[items.btop.recipes]]
mode = "user"
distros = ["*"]
cmd = 'wget https://github.com/aristocratos/btop/releases/download/v1.4.5/btop-x86_64-linux-musl.tbz -O btop.tbz && tar -xvf btop.tbz && cp btop/bin/btop ~/.local/bin && rm -r btop && rm btop.tbz'

