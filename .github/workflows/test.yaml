name: Test

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_call:

jobs:
  launch-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run launch catalog parity matrix
        run: ./scripts/run-launch-parity-matrix.sh

      - name: Upload parity evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launch-catalog-parity-evidence
          path: .sisyphus/evidence/
