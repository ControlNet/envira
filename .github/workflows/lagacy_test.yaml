name: Lagacy Test
on:
  workflow_call:
  push:
    branches-ignore:
      - main
    paths:
      - 'run.sh'
      - 'run_user.sh'
      - 'verify.sh'
      - '.github/integration-test/**'
      - '.github/workflows/lagacy_test.yaml'
  pull_request:
    paths:
      - 'run.sh'
      - 'run_user.sh'
      - 'verify.sh'
      - '.github/integration-test/**'
      - '.github/workflows/lagacy_test.yaml'
        
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, fedora, manjaro, arch]
        mode: [sudo, user]
    name: ${{ matrix.os }} ${{ matrix.mode }} test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build docker image
        run: docker build -f .github/integration-test/Dockerfile-${{ matrix.os }}-${{ matrix.mode }} -t test_os .
      
      - name: Run installer and verification
        run: |
          script="run.sh"
          if [ "${{ matrix.mode }}" = "user" ]; then
            script="run_user.sh"
          fi

          docker run --rm --privileged=true \
            -e HOME=/home/user \
            -w /home/user \
            -v "$PWD:/workspace" \
            test_os \
            bash -lc "bash \"$script\" && bash /workspace/verify.sh"
