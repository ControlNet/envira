required_version = "0.1.0"
distros = ["ubuntu", "fedora", "arch", "opensuse-tumbleweed"]
shell = "bash"
default_bundles = ["launch-parity"]

[bundles.launch-parity]
name = "Launch Parity"
desc = "Keyed TOML fixture for launch parity regression coverage."
items = ["shell-path"]

[items.shell-path]
name = "Shell Path"
desc = "Ensures launch parity validates keyed TOML catalogs end to end."
depends_on = []

[[items.shell-path.recipes]]
mode = "user"
distros = ["*"]
cmd = "mkdir -p ~/.local/bin && install -m 755 /bin/sh ~/.local/bin/envira-launch-parity-tool"

[[items.shell-path.verifiers]]
mode = "user"
distros = ["*"]
cmd = "command -v envira-launch-parity-tool"
